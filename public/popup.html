<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BashaMark Quick Save</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="icon-container">
        <!-- Bookmark icon SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
        </svg>
      </div>
      <div class="title-container">
        <h2>Quick Save</h2>
        <p>Save to <span id="board-name-display">...</span></p>
      </div>
    </div>

    <form id="save-form">
      <div class="form-group">
        <label for="bookmark-url">URL</label>
        <input type="text" id="bookmark-url" required />
      </div>

      <div class="form-group">
        <label for="bookmark-title">TITLE</label>
        <input type="text" id="bookmark-title" required />
      </div>

      <div class="form-group">
        <label for="board-select">BOARD</label>
        <div class="select-wrapper">
          <select id="board-select"></select>
        </div>
      </div>

      <button type="submit" id="save-button" class="btn-save">Save bookmark</button>
    </form>
  </div>
  <script src="popup.js"></script>
</body>
</html>
